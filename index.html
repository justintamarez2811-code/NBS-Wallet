<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NB Air</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <main class="app-container">
        <header class="user-header" id="user-btn">
            <span class="user-name" id="display-name">Inicia Sesión</span>
            <div class="user-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0d1b3e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
        </header>

        <section class="balance-section">
            <p>Tu saldo es de</p>
            <h1>$0,00</h1>
            <button class="btn-recargar">Recargar</button>
        </section>

        <div class="cards-stack">
            <div class="card card-grey">
                <h2 class="card-title">Datos</h2>
            </div>

            <div class="card card-blue">
                <h2 class="card-title">Acciones</h2>
            </div>

            <div class="card card-black">
                <div class="drag-handle"></div>
                <h2 class="card-title">Historial</h2>
                <div class="empty-state">
                    <p>No hay registros todavía</p>
                </div>
            </div>
        </div>
    </main>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Inicia Sesión</h3>
            <p>Accede a la app para que puedas usar todas las funciones de la aplicación</p>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="Correo Electrónico">
                <input type="password" id="password" placeholder="Contraseña">
            </div>

            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="btn-continue" onclick="saveLogin()">Continuar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
