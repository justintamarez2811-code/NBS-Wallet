<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NB Air</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-container">
        <header class="user-header">
            <span class="user-name">Nombre de Usuario</span>
            <div class="user-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0d1b3e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
        </header>

        <section class="balance-section">
            <p>Tu saldo es de</p>
            <h1>$0,00</h1>
            <button class="btn-recargar">Recargar</button>
        </section>

        <div class="cards-stack">
            <div class="card card-grey">
                <h2 class="card-title">Datos</h2>
            </div>

            <div class="card card-blue">
                <h2 class="card-title">Acciones</h2>
            </div>

            <div class="card card-black">
                <div class="drag-handle"></div>
                <h2 class="card-title">Historial</h2>
                <div class="empty-state">
                    <p>No hay registros todavía</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
